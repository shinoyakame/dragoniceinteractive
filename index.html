<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <link href='https://www.dragoniceinteractive.com/favicon.ico' rel='icon' type='image/x-icon' />
    <meta content='http://github.dragoniceinteractive.com/' property='og:url' />
    <meta content='Dragon Ice Interactive Encyclopedia' property='og:title' />
    <meta content="Collections of Dragon Ice Interactive" property='og:description' />
    <meta
        content='img/brown_background.png'
        property='og:image' />
    <title>
        Dragon Ice Interactive Encyclopedia
    </title>
</head>
<style>
    :root {
        --blue-color: rgb(75, 75, 247);
        --header-bar-height: 50px;
        --cartoon-font: "Comic Sans MS", cursive, sans-serif;
        --formal-font: "Courier New", Courier, monospace;
        --fantasy-font: "Lucida Sans Unicode", "Lucida Grande", sans-serif;;
        --gradient-gray: linear-gradient(180deg, rgba(255, 255, 255, 1) 0%, rgba(233, 233, 233, 1) 100%);
        --info-left: 70px;
        --header-select-width: 14em;
        --info-container-width: calc(100vw - var(--info-left) - var(--header-select-width));
    }

    html {
        color: var(--blue-color);
        font-family: var(--cartoon-font);
    }

    body {
        margin: 0px;
    }

    /*------Section: Header--------------*/
    .header-menu {
        position: absolute;
        left: 0px;
        top: 0px;
        background: var(--gradient-gray);
        color: black;
        border-bottom: 1px solid gray;
        display: flex;
        justify-content: center;
        align-items: center;
        width: 100vw;
        height: var(--header-bar-height);
        z-index: 300;
        font-family: var(--formal-font);
    }

    /*------Section: Header--------------*/

    /*------Section: Homepage--------------*/

    .hidden{
        visibility: hidden;
    }

    .show{
        visibility: visible;
    }

    .homepage{
        position: absolute;
        bottom: 0px;
        right: 0px;
    }

    .headertext{
        font-size: 1.4em;
        text-align: center;
        font-weight: bold;
        color: darkgreen;
        font-family: var(--fantasy-font);
    }

    div.homepage td{
        display: inline-block;
        color: cornflowerblue;
    }

    div.homepage tr td:first-child{
        font-weight: bold;
        color: darkcyan;
    }

    /*------Section: Homepage--------------*/

    /*------Section: Content--------------*/
    .content-scroll {
        position: absolute;
        display: flex;
        width: 100vw;
        height: calc(100vh - var(--header-bar-height));
        overflow-y: auto;
        top: var(--header-bar-height);
        left: 0px;
        font-family: var(--formal-font);
        background: url('img/brown_background.png') no-repeat center;
        background-size: cover;
    }

    .content {
        width: 100vw;
        padding: 1.5vw;
        display: flex;
        flex-direction: column;
    }

    .card {
        min-width: 250px;
        box-shadow: 0px 0px 2px 2px lightcyan;
        background-color: white;
        margin: 1.5vw;
        padding: 10px;
    }

    /*------Section: Content--------------*/
</style>

<body>
    <div class="header-menu">
    </div>
    <div class="content-scroll">
        <div class="content">
            <div id="homepage" class="homepage show">
                <div class="card">
                    <div class="headertext">Contact Information</div>
                    <hr/>
                    <table cellspacing="0" cellpadding="4">
                        <tr>
                            <td>Created by :</td>
                            <td>Shinoyakame (Rattanapol Teankachon)</td>
                        </tr>
                        <tr>
                            <td>Dragon Ice Bubble Fanart by :</td>
                            <td>NiceInde</td>
                        </tr>
                    </table>
                    <br/>
                    <table cellspacing="0" cellpadding="4">
                        <tr>
                            <td>Contact web developer :</td>
                            <td><a href="https://www.facebook.com/para.yoshi">Rattanapol Teankachon</a></td>
                        </tr>
                        <tr>
                            <td>Contact web background artist :</td>
                            <td><a href="https://www.facebook.com/NiceInde050/">NiceInde050</a></td>
                        </tr>
                    </table>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
